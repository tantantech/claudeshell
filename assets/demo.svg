<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="800" height="520">
  <style>
    @keyframes typing1 { 0%,8% { width: 0 } 12% { width: 156px } 100% { width: 156px } }
    @keyframes typing2 { 0%,22% { width: 0 } 30% { width: 468px } 100% { width: 468px } }
    @keyframes cursor1 { 0%,8% { opacity: 1 } 8.1% { opacity: 0 } 12% { opacity: 0 } 12.1% { opacity: 1 } 13% { opacity: 0 } 100% { opacity: 0 } }
    @keyframes cursor2 { 0%,22% { opacity: 0 } 22.1% { opacity: 1 } 30% { opacity: 0 } 30.1% { opacity: 1 } 31% { opacity: 0 } 100% { opacity: 0 } }
    @keyframes blink { 0%,49% { opacity: 1 } 50%,100% { opacity: 0 } }
    @keyframes show-output1 { 0%,14% { opacity: 0 } 15% { opacity: 1 } 100% { opacity: 1 } }
    @keyframes show-output2 { 0%,33% { opacity: 0 } 34% { opacity: 1 } 100% { opacity: 1 } }
    @keyframes show-prompt2 { 0%,20% { opacity: 0 } 21% { opacity: 1 } 100% { opacity: 1 } }
    @keyframes show-prompt3 { 0%,52% { opacity: 0 } 53% { opacity: 1 } 100% { opacity: 1 } }
    @keyframes show-tools { 0%,35% { opacity: 0 } 36% { opacity: 0.6 } 100% { opacity: 0.6 } }
    @keyframes show-result { 0%,42% { opacity: 0 } 43% { opacity: 1 } 100% { opacity: 1 } }
    .mono { font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', Menlo, Monaco, monospace; }
    .term-bg { fill: #1a1b26; }
    .title-bar { fill: #2a2b3d; }
    .text-white { fill: #c0caf5; }
    .text-dim { fill: #565f89; }
    .text-orange { fill: #ff9e64; }
    .text-green { fill: #9ece6a; }
    .text-blue { fill: #7aa2f7; }
    .text-cyan { fill: #7dcfff; }
    .text-yellow { fill: #e0af68; }
    .text-purple { fill: #bb9af7; }
    .text-red { fill: #f7768e; }
  </style>

  <!-- Window chrome -->
  <rect class="term-bg" width="800" height="520" rx="12"/>
  <rect class="title-bar" width="800" height="40" rx="12"/>
  <rect class="title-bar" x="0" y="28" width="800" height="12"/>
  <!-- Traffic lights -->
  <circle cx="24" cy="20" r="7" fill="#ff5f57"/>
  <circle cx="46" cy="20" r="7" fill="#febc2e"/>
  <circle cx="68" cy="20" r="7" fill="#28c840"/>
  <!-- Title -->
  <text x="400" y="25" text-anchor="middle" class="mono text-dim" font-size="13">nesh</text>

  <!-- Line 1: Regular command -->
  <g transform="translate(24, 72)">
    <!-- Powerline prompt segments -->
    <rect x="0" y="-14" width="52" height="22" rx="3" fill="#ff8c00"/>
    <text x="8" y="2" class="mono" font-size="13" font-weight="bold" fill="white">nesh</text>
    <text x="52" y="2" class="mono" font-size="16" fill="#ff8c00">&#xE0B0;</text>
    <rect x="62" y="-14" width="100" height="22" rx="3" fill="#a6530c"/>
    <text x="70" y="2" class="mono" font-size="13" font-weight="bold" fill="white">~/Projects</text>
    <text x="162" y="2" class="mono" font-size="16" fill="#a6530c">&#xE0B0;</text>
    <text x="176" y="2" class="mono text-orange" font-size="14">&#x276F;</text>
    <!-- Typed command with animation -->
    <g>
      <clipPath id="clip1"><rect x="192" y="-14" height="22"><animate attributeName="width" values="0;0;0;0;156;156" keyTimes="0;0.08;0.08;0.08;0.12;1" dur="16s" repeatCount="indefinite"/></rect></clipPath>
      <text x="192" y="2" class="mono text-white" font-size="14" clip-path="url(#clip1)">git log --oneline</text>
    </g>
  </g>

  <!-- Line 1 output -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.14;0.15;1" dur="16s" repeatCount="indefinite"/>
    <text x="24" y="108" class="mono text-yellow" font-size="13">84dd9ff <tspan class="text-white">docs: redesign README for marketing</tspan></text>
    <text x="24" y="128" class="mono text-yellow" font-size="13">82f60e5 <tspan class="text-white">feat: expand provider registry to 15 providers</tspan></text>
    <text x="24" y="148" class="mono text-yellow" font-size="13">929e3f5 <tspan class="text-white">feat: wire multi-model support into shell</tspan></text>
  </g>

  <!-- Line 2: AI command prompt -->
  <g transform="translate(24, 188)" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.20;0.21;1" dur="16s" repeatCount="indefinite"/>
    <rect x="0" y="-14" width="52" height="22" rx="3" fill="#ff8c00"/>
    <text x="8" y="2" class="mono" font-size="13" font-weight="bold" fill="white">nesh</text>
    <text x="52" y="2" class="mono" font-size="16" fill="#ff8c00">&#xE0B0;</text>
    <rect x="62" y="-14" width="100" height="22" rx="3" fill="#a6530c"/>
    <text x="70" y="2" class="mono" font-size="13" font-weight="bold" fill="white">~/Projects</text>
    <text x="162" y="2" class="mono" font-size="16" fill="#a6530c">&#xE0B0;</text>
    <text x="176" y="2" class="mono text-orange" font-size="14">&#x276F;</text>
    <!-- AI command with animation -->
    <g>
      <clipPath id="clip2"><rect x="192" y="-14" height="22"><animate attributeName="width" values="0;0;0;0;468;468" keyTimes="0;0.22;0.22;0.22;0.30;1" dur="16s" repeatCount="indefinite"/></rect></clipPath>
      <text x="192" y="2" class="mono" font-size="14" clip-path="url(#clip2)"><tspan class="text-green" font-weight="bold">a</tspan><tspan class="text-white"> find files over 100 lines and rank by complexity</tspan></text>
    </g>
  </g>

  <!-- AI tool use indicators -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;0.6;0.6" keyTimes="0;0.35;0.36;1" dur="16s" repeatCount="indefinite"/>
    <text x="36" y="234" class="mono text-dim" font-size="12">&#x2192; Reading src/*.ts...</text>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;0.6;0.6" keyTimes="0;0.38;0.39;1" dur="16s" repeatCount="indefinite"/>
    <text x="36" y="254" class="mono text-dim" font-size="12">&#x2192; Running wc -l src/*.ts | sort -rn...</text>
  </g>

  <!-- AI Response -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.42;0.43;1" dur="16s" repeatCount="indefinite"/>
    <text x="24" y="290" class="mono text-white" font-size="13" font-weight="bold">Found 5 files over 100 lines, ranked by cyclomatic complexity:</text>
    <text x="24" y="318" class="mono" font-size="13">
      <tspan class="text-cyan">1.</tspan><tspan class="text-white"> src/shell.ts</tspan><tspan class="text-dim">      248 lines  complexity: 14</tspan>
    </text>
    <text x="24" y="340" class="mono" font-size="13">
      <tspan class="text-cyan">2.</tspan><tspan class="text-white"> src/ai.ts</tspan><tspan class="text-dim">        179 lines  complexity: 11</tspan>
    </text>
    <text x="24" y="362" class="mono" font-size="13">
      <tspan class="text-cyan">3.</tspan><tspan class="text-white"> src/classify.ts</tspan><tspan class="text-dim">  163 lines  complexity: 9</tspan>
    </text>
    <text x="24" y="384" class="mono" font-size="13">
      <tspan class="text-cyan">4.</tspan><tspan class="text-white"> src/renderer.ts</tspan><tspan class="text-dim">  142 lines  complexity: 7</tspan>
    </text>
    <text x="24" y="406" class="mono" font-size="13">
      <tspan class="text-cyan">5.</tspan><tspan class="text-white"> src/config.ts</tspan><tspan class="text-dim">    106 lines  complexity: 5</tspan>
    </text>
  </g>

  <!-- Cost line -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;0.5;0.5" keyTimes="0;0.48;0.49;1" dur="16s" repeatCount="indefinite"/>
    <text x="24" y="440" class="mono text-dim" font-size="11">tokens: 1.8k in / 0.6k out | cost: $0.0028</text>
  </g>

  <!-- Prompt 3 with blinking cursor -->
  <g transform="translate(24, 472)" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.52;0.53;1" dur="16s" repeatCount="indefinite"/>
    <rect x="0" y="-14" width="52" height="22" rx="3" fill="#ff8c00"/>
    <text x="8" y="2" class="mono" font-size="13" font-weight="bold" fill="white">nesh</text>
    <text x="52" y="2" class="mono" font-size="16" fill="#ff8c00">&#xE0B0;</text>
    <rect x="62" y="-14" width="100" height="22" rx="3" fill="#a6530c"/>
    <text x="70" y="2" class="mono" font-size="13" font-weight="bold" fill="white">~/Projects</text>
    <text x="162" y="2" class="mono" font-size="16" fill="#a6530c">&#xE0B0;</text>
    <text x="176" y="2" class="mono text-orange" font-size="14">&#x276F;</text>
    <!-- Blinking cursor -->
    <rect x="192" y="-10" width="9" height="18" fill="#c0caf5">
      <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.49;0.5;1" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
